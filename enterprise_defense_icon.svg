<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Black space background -->
  <rect width="64" height="64" rx="10" fill="#000000"/>

  <!-- Stars -->
  <circle cx="8"  cy="10" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="55" cy="8"  r="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="20" cy="5"  r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="48" cy="18" r="0.8" fill="#ffffff" opacity="0.8"/>
  <circle cx="6"  cy="52" r="1"   fill="#ffffff" opacity="0.7"/>
  <circle cx="58" cy="48" r="0.8" fill="#ffffff" opacity="0.8"/>
  <circle cx="60" cy="28" r="0.7" fill="#ffffff" opacity="0.6"/>
  <circle cx="4"  cy="34" r="0.7" fill="#ffffff" opacity="0.7"/>

  <!-- Shield ring (LCARS blue) -->
  <circle cx="32" cy="36" r="18" fill="none" stroke="#99ccff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="32" cy="36" r="14" fill="#0a1a2e" opacity="0.5"/>

  <!-- Nacelle pylons -->
  <line x1="28" y1="42" x2="14" y2="48" stroke="#5a5a78" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="42" x2="50" y2="48" stroke="#5a5a78" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left nacelle -->
  <ellipse cx="13" cy="52" rx="5" ry="9" fill="#506090"/>
  <circle  cx="13" cy="44" r="3" fill="#cc3c1e"/>
  <ellipse cx="13" cy="60" rx="4" ry="2" fill="#a0c0ff"/>

  <!-- Right nacelle -->
  <ellipse cx="51" cy="52" rx="5" ry="9" fill="#506090"/>
  <circle  cx="51" cy="44" r="3" fill="#cc3c1e"/>
  <ellipse cx="51" cy="60" rx="4" ry="2" fill="#a0c0ff"/>

  <!-- Engineering hull -->
  <ellipse cx="32" cy="44" rx="8" ry="10" fill="#787890"/>

  <!-- Deflector dish -->
  <circle cx="32" cy="50" r="4" fill="#3c82dc"/>
  <circle cx="32" cy="50" r="2.5" fill="#8cc8ff"/>

  <!-- Neck connector -->
  <ellipse cx="32" cy="35" rx="4" ry="5" fill="#686880"/>

  <!-- Saucer section -->
  <ellipse cx="32" cy="26" rx="18" ry="13" fill="#909098"/>
  <ellipse cx="32" cy="26" rx="15" ry="10" fill="none" stroke="#aaaacc" stroke-width="1"/>
  <!-- Bridge dome -->
  <circle  cx="32" cy="20" r="4"  fill="#c8c8d8"/>
  <!-- Phaser arc -->
  <path d="M 16 26 A 16 10 0 0 1 48 26" fill="none" stroke="#ff9900" stroke-width="1.5" opacity="0.9"/>

  <!-- LCARS top accent bar -->
  <rect x="0" y="0" width="64" height="6" rx="3" fill="#ff9900" opacity="0.9"/>
  <rect x="0" y="0" width="12" height="6" rx="3" fill="#9966cc"/>
</svg>
