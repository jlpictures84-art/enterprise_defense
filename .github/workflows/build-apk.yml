name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip libffi-dev libssl-dev autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libc6-dev libbz2-dev libexpat1-dev liblzma-dev uuid-dev python3-dev

      - name: Install buildozer + cython
        run: pip install buildozer cython==0.29.37

      # Install NDK 25b on the runner's pre-configured SDK (licenses already accepted there)
      - name: Install NDK 25b
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;25.2.9519653"

      # Patch buildozer.spec to use the runner's SDK — must be inside [app] section
      - name: Point buildozer at runner's Android SDK
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/25.2.9519653"
          # Insert after [app] line so keys land in the right section
          sed -i "/^\[app\]/a android.sdk_path = $ANDROID_HOME\nandroid.ndk_path = $NDK_PATH" buildozer.spec

      # Buildozer 1.5 expects sdkmanager at legacy tools/bin/ path — create shim
      - name: Create sdkmanager shim for buildozer 1.5 compatibility
        run: |
          sudo mkdir -p "$ANDROID_HOME/tools/bin"
          sudo ln -sf "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_HOME/tools/bin/sdkmanager"

      - name: Cache python-for-android toolchain
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: p4a-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('*.py') }}
          restore-keys: p4a-${{ runner.os }}-

      - name: Clear stale APK dist so buildozer always rebuilds
        run: |
          rm -rf .buildozer/android/platform/build-*/dist/ 2>/dev/null || true
          rm -rf bin/ 2>/dev/null || true

      - name: Use Java 17 (required by Android Gradle plugin)
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Build APK
        run: buildozer android debug

      - name: Collect APK
        run: |
          mkdir -p dist
          cp bin/*.apk dist/enterprise-defense-build${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-defense-apk
          path: dist/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Auto-build from commit ${{ github.sha }}

            **Install:** Download the APK → allow "Install unknown apps" in Android Settings → open the file.
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
