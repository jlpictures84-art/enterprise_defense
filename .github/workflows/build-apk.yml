name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip libffi-dev libssl-dev autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libc6-dev libbz2-dev libexpat1-dev lzma python3-dev

      # Export ANDROID_HOME into Actions env context so ${{ env.ANDROID_HOME }} works below
      - name: Export Android SDK path
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Accept Android SDK licenses and install NDK 25b
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;25.2.9519653"

      - name: Install buildozer + cython
        run: pip install buildozer cython==0.29.37

      - name: Cache python-for-android build
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: p4a-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: p4a-${{ runner.os }}-

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROIDSDK: ${{ env.ANDROID_HOME }}
          ANDROIDNDK: ${{ env.ANDROID_NDK_ROOT }}
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"

      - name: Collect APK
        run: |
          mkdir -p dist
          cp bin/*.apk dist/enterprise-defense-build${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-defense-apk
          path: dist/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Auto-build from commit ${{ github.sha }}

            **Install:** Download the APK → allow "Install unknown apps" in Android Settings → open the file.
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
